<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>筋トレ記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #1a1a1f;
    --surface2: #242429;
    --border: #2e2e36;
    --text: #f0f0f2;
    --text-muted: #7a7a8a;
    --accent: #7fff6e;
    --accent-dim: rgba(127,255,110,0.12);
    --accent-glow: rgba(127,255,110,0.25);
    --danger: #ff6e6e;
    --radius: 16px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f2f0;
      --surface: #ffffff;
      --surface2: #e8e8e4;
      --border: #d4d4cc;
      --text: #1a1a1e;
      --text-muted: #888880;
      --accent: #2a8a20;
      --accent-dim: rgba(42,138,32,0.10);
      --accent-glow: rgba(42,138,32,0.20);
      --danger: #cc3333;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 16px;
    padding-bottom: 32px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-top: 8px;
  }

  .title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .total-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--accent-glow);
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card.active {
    border-color: var(--accent-glow);
    box-shadow: 0 0 0 1px var(--accent-glow), inset 0 0 20px var(--accent-dim);
  }

  .card-icon {
    font-size: 22px;
    width: 36px;
    text-align: center;
    flex-shrink: 0;
  }

  .card-info {
    flex: 1;
    min-width: 0;
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .count-display {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    min-width: 40px;
    text-align: center;
    line-height: 1;
    color: var(--text);
    transition: color 0.1s;
  }

  .count-display.bumped {
    color: var(--accent);
  }

  .btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.08s, opacity 0.1s;
    background: var(--surface2);
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }

  .btn:active { transform: scale(0.88); }

  .btn-plus {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-glow);
    font-size: 24px;
    font-weight: 300;
  }

  .btn-minus {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 20px;
  }

  .btn-minus:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* streak dots */
  .dots {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .dot.filled {
    background: var(--accent);
  }

  /* footer */
  footer {
    margin-top: 24px;
    display: flex;
    justify-content: center;
  }

  .reset-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 18px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:active { color: var(--danger); border-color: var(--danger); }

  /* pulse animation on tap */
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    width: 40px; height: 40px;
    background: var(--accent-glow);
    animation: pulse-ring 0.4s ease-out forwards;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <span class="title">筋トレ記録</span>
  <span class="total-badge" id="totalBadge">合計 0 セット</span>
</header>

<div class="cards" id="cards"></div>

<footer>
  <button class="reset-btn" onclick="confirmReset()">全リセット</button>
</footer>

<script>
const EXERCISES = [
  { id: 'abs',    name: '腹筋ローラー', icon: '🔄', meta: '週3〜4回・現状維持' },
  { id: 'pull',   name: '懸垂',         icon: '🏋️', meta: '毎日・できる回数' },
  { id: 'squat',  name: 'スクワット',   icon: '🦵', meta: '毎日・20〜30回×2〜3セット' },
  { id: 'lunge',  name: 'ランジ',       icon: '⚡', meta: '週3〜4回・左右10回×2セット' },
  { id: 'calf',   name: 'カーフレイズ', icon: '🦶', meta: '毎日・30回×2〜3セット' },
];

const STORAGE_KEY = 'workout_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let counts = load();

function getCount(id) { return counts[id] || 0; }

function render() {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  let total = 0;

  EXERCISES.forEach(ex => {
    const n = getCount(ex.id);
    total += n;

    const card = document.createElement('div');
    card.className = 'card' + (n > 0 ? ' active' : '');
    card.innerHTML = `
      <div class="card-icon">${ex.icon}</div>
      <div class="card-info">
        <div class="card-name">${ex.name}</div>
        <div class="card-meta">${ex.meta}</div>
        <div class="dots">${renderDots(n)}</div>
      </div>
      <div class="card-controls">
        <button class="btn btn-minus" onclick="change('${ex.id}', -1, this)" ${n === 0 ? 'disabled' : ''}>−</button>
        <div class="count-display" id="count-${ex.id}">${n}</div>
        <button class="btn btn-plus" onclick="change('${ex.id}', +1, this)">+</button>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('totalBadge').textContent = `合計 ${total} セット`;
}

function renderDots(n) {
  const max = Math.max(n, 5);
  return Array.from({length: max}, (_, i) =>
    `<div class="dot ${i < n ? 'filled' : ''}"></div>`
  ).join('');
}

function change(id, delta, btn) {
  const prev = getCount(id);
  const next = Math.max(0, prev + delta);
  if (next === prev) return;
  counts[id] = next;
  save(counts);

  // bump animation
  const display = document.getElementById('count-' + id);
  display.textContent = next;
  display.classList.remove('bumped');
  void display.offsetWidth;
  display.classList.add('bumped');
  setTimeout(() => display.classList.remove('bumped'), 300);

  // ripple on plus
  if (delta > 0) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const cardRect = btn.closest('.card').getBoundingClientRect();
    ripple.style.left = (rect.left - cardRect.left) + 'px';
    ripple.style.top = (rect.top - cardRect.top) + 'px';
    btn.closest('.card').appendChild(ripple);
    setTimeout(() => ripple.remove(), 400);
  }

  render();
}

function confirmReset() {
  if (confirm('全セットのカウントをリセットしますか？')) {
    counts = {};
    save(counts);
    render();
  }
}

render();
</script>
</body>
</html>
