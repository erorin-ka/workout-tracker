<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>筋トレ記録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e10;
    --surface: #1a1a1f;
    --surface2: #242429;
    --border: #2e2e36;
    --text: #f0f0f2;
    --text-muted: #7a7a8a;
    --accent: #7fff6e;
    --accent-dim: rgba(127,255,110,0.12);
    --accent-glow: rgba(127,255,110,0.25);
    --danger: #ff6e6e;
    --radius: 16px;
    --radius-sm: 10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f2f2f0;
      --surface: #ffffff;
      --surface2: #e8e8e4;
      --border: #d4d4cc;
      --text: #1a1a1e;
      --text-muted: #888880;
      --accent: #2a8a20;
      --accent-dim: rgba(42,138,32,0.10);
      --accent-glow: rgba(42,138,32,0.20);
      --danger: #cc3333;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    padding: 16px;
    padding-bottom: 32px;
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-top: 8px;
  }

  .title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .total-badge {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--accent-glow);
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card.active {
    border-color: var(--accent-glow);
    box-shadow: 0 0 0 1px var(--accent-glow), inset 0 0 20px var(--accent-dim);
  }

  .card-icon {
    font-size: 22px;
    width: 36px;
    text-align: center;
    flex-shrink: 0;
  }

  .card-info {
    flex: 1;
    min-width: 0;
  }

  .card-name {
    font-size: 15px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
  }

  .card-meta {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .count-display {
    font-family: 'DM Mono', monospace;
    font-size: 26px;
    font-weight: 500;
    min-width: 40px;
    text-align: center;
    line-height: 1;
    color: var(--text);
    transition: color 0.1s;
  }

  .count-display.bumped {
    color: var(--accent);
  }

  .btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.08s, opacity 0.1s;
    background: var(--surface2);
    color: var(--text);
    -webkit-user-select: none;
    user-select: none;
  }

  .btn:active { transform: scale(0.88); }

  .btn-plus {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent-glow);
    font-size: 24px;
    font-weight: 300;
  }

  .btn-minus {
    background: var(--surface2);
    color: var(--text-muted);
    font-size: 20px;
  }

  .btn-minus:disabled {
    opacity: 0.3;
    cursor: default;
  }

  /* streak dots */
  .dots {
    display: flex;
    gap: 4px;
    margin-top: 5px;
    flex-wrap: wrap;
  }
  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.2s;
  }
  .dot.filled {
    background: var(--accent);
  }

  /* footer */
  footer {
    margin-top: 24px;
    display: flex;
    justify-content: center;
  }

  .reset-btn {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
    color: var(--text-muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 18px;
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .reset-btn:active { color: var(--danger); border-color: var(--danger); }

  /* modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open {
    display: flex;
    animation: fade-in 0.2s ease;
  }
  @keyframes fade-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 28px 24px 40px;
    width: 100%;
    max-width: 480px;
    animation: slide-up 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slide-up {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 40px;
    height: 4px;
    background: var(--border);
    border-radius: 99px;
    margin: 0 auto 20px;
  }
  .modal-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .modal-icon { font-size: 28px; }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
  }
  .modal-section {
    margin-bottom: 16px;
  }
  .modal-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .modal-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
  }
  .modal-steps {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .modal-steps li {
    display: flex;
    gap: 10px;
    font-size: 14px;
    line-height: 1.5;
  }
  .step-num {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: var(--accent-dim);
    border-radius: 50%;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .modal-close {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    cursor: pointer;
  }
  .modal-close:active { opacity: 0.7; }

  .card-name {
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: transparent;
    transition: text-decoration-color 0.15s;
  }
  .card-name:active { text-decoration-color: var(--accent); }

  /* pulse animation on tap */
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.5; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  .ripple {
    position: absolute;
    border-radius: 50%;
    width: 40px; height: 40px;
    background: var(--accent-glow);
    animation: pulse-ring 0.4s ease-out forwards;
    pointer-events: none;
  }
</style>
</head>
<body>

<header>
  <span class="title">筋トレ記録</span>
  <span class="total-badge" id="totalBadge">合計 0 セット</span>
</header>

<div class="cards" id="cards"></div>

<!-- modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-icon" id="modalIcon"></div>
      <div class="modal-title" id="modalTitle"></div>
    </div>
    <div class="modal-section">
      <div class="modal-label">やり方</div>
      <ul class="modal-steps" id="modalSteps"></ul>
    </div>
    <div class="modal-section">
      <div class="modal-label">頻度・目安</div>
      <div class="modal-text" id="modalMeta"></div>
    </div>
    <button class="modal-close" onclick="closeModalDirect()">閉じる</button>
  </div>
</div>

<footer>
  <button class="reset-btn" onclick="confirmReset()">全リセット</button>
</footer>

<script>
const EXERCISES = [
  {
    id: 'abs', name: '腹筋ローラー', icon: '🔄', meta: '週3〜4回・現状維持',
    steps: [
      '膝をついてローラーを両手で握る',
      '腰が落ちないよう体幹を締めながら、ゆっくり前に伸ばす',
      '限界まで伸ばしたら、腹筋を使って引き戻す',
      '慣れたら膝なし（立ちコロ）に挑戦'
    ]
  },
  {
    id: 'pull', name: '懸垂', icon: '🏋️', meta: '毎日・できる回数',
    steps: [
      'バーをデッドハング（腕まっすぐ）でぶら下がる',
      '肩甲骨を寄せながら、あごがバーを超えるまで引き上げる',
      'ゆっくり5〜10秒かけて降りる（ネガティブ動作）',
      'しんどければ足を台に乗せて補助してもOK'
    ]
  },
  {
    id: 'squat', name: 'スクワット', icon: '🦵', meta: '毎日・20〜30回×2〜3セット',
    steps: [
      '足を肩幅に開き、つま先を少し外向きにする',
      'お尻を後ろに引きながらゆっくりしゃがむ',
      '膝がつま先より前に出ないように注意',
      '太ももが床と平行になるくらいまで下げて戻す'
    ]
  },
  {
    id: 'lunge', name: 'ランジ', icon: '⚡', meta: '週3〜4回・左右10回×2セット',
    steps: [
      '足を前後に大きく踏み出す',
      '後ろ足の膝を床ギリギリまで落とす',
      '前膝が90度になるのが目安',
      '左右交互に繰り返す'
    ]
  },
  {
    id: 'calf', name: 'カーフレイズ', icon: '🦶', meta: '毎日・30回×2〜3セット',
    steps: [
      '足を腰幅に開いて立つ',
      '壁に軽く手を添えてバランスを取る',
      'ゆっくりつま先立ちになる',
      'ゆっくり元に戻す（降ろすときも意識して）'
    ]
  },
];

const STORAGE_KEY = 'workout_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let counts = load();

function getCount(id) { return counts[id] || 0; }

function render() {
  const container = document.getElementById('cards');
  container.innerHTML = '';
  let total = 0;

  EXERCISES.forEach(ex => {
    const n = getCount(ex.id);
    total += n;

    const card = document.createElement('div');
    card.className = 'card' + (n > 0 ? ' active' : '');
    card.innerHTML = `
      <div class="card-icon">${ex.icon}</div>
      <div class="card-info">
        <div class="card-name" onclick="openModal('${ex.id}')">${ex.name} <span style="font-size:10px;color:var(--text-muted)">▶</span></div>
        <div class="card-meta">${ex.meta}</div>
        <div class="dots">${renderDots(n)}</div>
      </div>
      <div class="card-controls">
        <button class="btn btn-minus" onclick="change('${ex.id}', -1, this)" ${n === 0 ? 'disabled' : ''}>−</button>
        <div class="count-display" id="count-${ex.id}">${n}</div>
        <button class="btn btn-plus" onclick="change('${ex.id}', +1, this)">+</button>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('totalBadge').textContent = `合計 ${total} セット`;
}

function renderDots(n) {
  const max = Math.max(n, 5);
  return Array.from({length: max}, (_, i) =>
    `<div class="dot ${i < n ? 'filled' : ''}"></div>`
  ).join('');
}

function change(id, delta, btn) {
  const prev = getCount(id);
  const next = Math.max(0, prev + delta);
  if (next === prev) return;
  counts[id] = next;
  save(counts);

  // bump animation
  const display = document.getElementById('count-' + id);
  display.textContent = next;
  display.classList.remove('bumped');
  void display.offsetWidth;
  display.classList.add('bumped');
  setTimeout(() => display.classList.remove('bumped'), 300);

  // ripple on plus
  if (delta > 0) {
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    const rect = btn.getBoundingClientRect();
    const cardRect = btn.closest('.card').getBoundingClientRect();
    ripple.style.left = (rect.left - cardRect.left) + 'px';
    ripple.style.top = (rect.top - cardRect.top) + 'px';
    btn.closest('.card').appendChild(ripple);
    setTimeout(() => ripple.remove(), 400);
  }

  render();
}

function confirmReset() {
  if (confirm('全セットのカウントをリセットしますか？')) {
    counts = {};
    save(counts);
    render();
  }
}

function openModal(id) {
  const ex = EXERCISES.find(e => e.id === id);
  if (!ex) return;
  document.getElementById('modalIcon').textContent = ex.icon;
  document.getElementById('modalTitle').textContent = ex.name;
  document.getElementById('modalMeta').textContent = ex.meta;
  document.getElementById('modalSteps').innerHTML = ex.steps
    .map((s, i) => `<li><span class="step-num">${i+1}</span><span>${s}</span></li>`)
    .join('');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
}

render();
</script>
</body>
</html>
